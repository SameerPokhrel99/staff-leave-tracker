<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovate TechSupport | Leave Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="max-w-6xl mx-auto py-10 px-4" x-data="leaveSystem()">
        
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border-l-8 border-blue-600 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-800">Innovate TechSupport</h1>
                <p class="text-blue-600 font-medium tracking-wide uppercase text-sm">Operations Department | Leave Ledger</p>
            </div>
            <div class="text-right mt-4 md:mt-0 bg-gray-50 p-3 rounded-lg border border-gray-100">
                <p class="text-gray-700"><strong>Authoriser:</strong> Sameer Pokhrel</p>
                <p class="text-gray-500 text-sm"><strong>System Date:</strong> 4/15/2026</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Search Employee</label>
                <input type="text" x-model="search" placeholder="Type name..." class="w-full border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 p-2 border">
            </div>
            <div class="bg-blue-600 p-4 rounded-lg shadow-sm text-white text-center">
                <p class="text-sm opacity-80 uppercase font-bold">Total Staff Records</p>
                <p class="text-3xl font-black">10</p>
            </div>
            <div class="bg-emerald-500 p-4 rounded-lg shadow-sm text-white text-center">
                <p class="text-sm opacity-80 uppercase font-bold">Total Days Recorded</p>
                <p class="text-3xl font-black" x-text="totalDays()"></p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">SN</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Employee Name</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Leave Type</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Duration</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-center">Total Days</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <template x-for="item in filteredLeaves" :key="item.sn">
                        <tr class="hover:bg-blue-50 transition-colors duration-200">
                            <td class="px-6 py-4 text-sm text-gray-500 font-mono" x-text="item.sn"></td>
                            <td class="px-6 py-4">
                                <div class="font-bold text-gray-800" x-text="item.name"></div>
                                <div class="text-xs text-gray-400 italic">Operations Team</div>
                            </td>
                            <td class="px-6 py-4">
                                <span :class="{
                                    'bg-orange-100 text-orange-700': item.type === 'Casual Leave',
                                    'bg-green-100 text-green-700': item.type === 'Annual Leave',
                                    'bg-red-100 text-red-700': item.type === 'Sick Leave'
                                }" class="px-3 py-1 rounded-full text-xs font-bold" x-text="item.type"></span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-600">
                                <span x-text="item.from"></span> <span class="mx-1 text-gray-300">→</span> <span x-text="item.to"></span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <span class="bg-gray-800 text-white px-2 py-1 rounded text-sm font-bold" x-text="item.days"></span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <footer class="mt-8 text-center text-gray-400 text-xs tracking-widest uppercase">
            &copy; 2026 Innovate TechSupport Leave Management System | Powered by Sameer Pokhrel
        </footer>
    </div>

    <script>
        function leaveSystem() {
            return {
                search: '',
                leaves: [
                    { sn: 1, name: "Sunita Didi", type: "Casual Leave", from: "1/7/2082", to: "1/8/2082", days: 2 },
                    { sn: 2, name: "Sunita Didi", type: "Casual Leave", from: "2082-01-11", to: "2082-01-11", days: 1 },
                    { sn: 3, name: "Sunita Didi", type: "Casual Leave", from: "2082-04-26", to: "2082-04-26", days: 0.5 },
                    { sn: 4, name: "Sunita Didi", type: "Annual Leave", from: "2082-08-01", to: "2082-08-05", days: 4 },
                    { sn: 5, name: "Rohan Sharma", type: "Annual Leave", from: "2082-08-23", to: "2082-08-23", days: 0.5 },
                    { sn: 6, name: "Aditi Verma", type: "Annual Leave", from: "2082-08-24", to: "2082-08-24", days: 1 },
                    { sn: 7, name: "Binod Thapa", type: "Sick Leave", from: "2082-09-03", to: "2082-09-03", days: 0.5 },
                    { sn: 8, name: "Maya Rai", type: "Sick Leave", from: "2082-12-24", to: "2082-12-24", days: 0.5 },
                    { sn: 9, name: "Suresh KC", type: "Sick Leave", from: "2082-12-25", to: "2082-12-25", days: 1 },
                    { sn: 10, name: "Rajesh Hamal", type: "Casual Leave", from: "2082-12-30", to: "2082-12-30", days: 1 }
                ],
                get filteredLeaves() {
                    return this.leaves.filter(i => i.name.toLowerCase().includes(this.search.toLowerCase()));
                },
                totalDays() {
                    return this.leaves.reduce((sum, item) => sum + item.days, 0);
                }
            }
        }
    </script>
</body>
</html>
