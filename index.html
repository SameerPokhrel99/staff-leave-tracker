<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Leave Ledger | Innovate Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfbf7; }
        .cream-card { background-color: #ffffff; border: 1px solid #e9e4d9; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="leaveSystem()" x-init="init()">
    <div class="bg-indigo-900 text-white text-[10px] font-black uppercase tracking-[0.3em] py-2 text-center">
        Cloud Sync Active • Staff Leave Log
    </div>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 pb-6 border-b border-slate-200">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Leave Attendance Ledger</h1>
                <p class="text-slate-500 font-medium tracking-tight">Real-time tracking • Support for Half Days</p>
            </div>
            <button @click="openModal()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black hover:bg-indigo-700 transition-all shadow-xl">＋ NEW LEAVE ENTRY</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="p-6 rounded-3xl border border-slate-200 bg-white shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Today</p>
                <p class="text-4xl font-black text-indigo-600" x-text="countActiveToday()"></p>
            </div>
            <div class="p-6 rounded-3xl border border-slate-200 bg-white shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Staff</p>
                <p class="text-4xl font-black text-slate-800" x-text="uniqueNames.length"></p>
            </div>
            <div class="p-6 rounded-3xl border border-slate-200 bg-white shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Days Used</p>
                <p class="text-4xl font-black text-slate-800" x-text="totalLeaveDays()"></p>
            </div>
        </div>

        <div class="mb-8">
            <input type="text" x-model="search" placeholder="Search employee name..." 
                   class="w-full max-w-md p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-200 bg-white shadow-sm font-bold">
        </div>

        <div class="cream-card rounded-[2rem] overflow-hidden shadow-sm">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Employee</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Leave Type</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-center">Duration</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 bg-white">
                    <template x-for="item in filteredLeaves" :key="item.id">
                        <tr class="hover:bg-slate-50/50">
                            <td class="px-8 py-6">
                                <p class="font-black text-slate-800 text-lg uppercase" x-text="item.name"></p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase" x-text="'Applied: ' + (item.appliedDate || 'N/A')"></p>
                            </td>
                            <td class="px-8 py-6">
                                <span class="px-3 py-1 bg-slate-100 rounded-lg text-[10px] font-black text-slate-500 uppercase" x-text="item.type"></span>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <p class="text-sm font-black text-slate-700" x-text="item.startDate + (item.isHalfDay ? ' (Half)' : ' to ' + item.endDate)"></p>
                                <p class="text-xs font-bold text-indigo-500" x-text="item.totalDays + ' Days'"></p>
                            </td>
                            <td class="px-8 py-6 text-right space-x-3">
                                <button @click="editLeave(item)" class="text-indigo-600 font-black text-[10px] uppercase">Edit</button>
                                <button @click="deleteLeave(item.id)" class="text-slate-300 hover:text-rose-500 font-black text-[10px] uppercase">Del</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div x-show="showForm" x-cloak class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-xl rounded-[2.5rem] p-10 shadow-2xl" @click.away="closeModal()">
                <h3 class="text-2xl font-black mb-8">Leave Entry</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Employee Name</label>
                        <input type="text" x-model="form.name" list="employeeList" placeholder="Name..." class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none font-bold">
                        <datalist id="employeeList"><template x-for="name in uniqueNames" :key="name"><option :value="name"></option></template></datalist>
                    </div>
                    
                    <div class="md:col-span-2">
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="halfDay" x-model="form.isHalfDay" class="w-5 h-5 accent-indigo-600">
                            <label for="halfDay" class="font-black text-slate-700 text-sm">Is this a Half Day leave?</label>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Start Date</label>
                        <input type="date" x-model="form.startDate" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none">
                    </div>
                    
                    <div x-show="!form.isHalfDay">
                        <label class="text-[10px] font-black text-slate-400 uppercase">End Date</label>
                        <input type="date" x-model="form.endDate" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none">
                    </div>

                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Leave Type</label>
                        <select x-model="form.type" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none font-bold">
                            <option value="Sick">Sick Leave</option>
                            <option value="Casual">Casual Leave</option>
                            <option value="Annual">Annual Leave</option>
                            <option value="Unpaid">Unpaid Leave</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-4 mt-10">
                    <button @click="saveLeave()" class="flex-1 bg-indigo-600 text-white p-5 rounded-2xl font-bold">Record Leave</button>
                    <button @click="closeModal()" class="px-8 text-slate-400 font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOTE2f_iGVlR3u-hZ5n5OPaRXnuYmA9gQ",
            authDomain: "insurancetracker-69b69.firebaseapp.com",
            databaseURL: "https://insurancetracker-69b69-default-rtdb.firebaseio.com",
            projectId: "insurancetracker-69b69",
            storageBucket: "insurancetracker-69b69.firebasestorage.app",
            messagingSenderId: "419918361385",
            appId: "1:419918361385:web:01ec2d6b32b0df6988fd38",
            measurementId: "G-QYD54HWGRB"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function leaveSystem() {
            return {
                showForm: false, isEditing: false, search: '', leaves: [],
                today: new Date().toISOString().split('T')[0],
                form: { id: null, name: '', type: 'Sick', startDate: '', endDate: '', isHalfDay: false, appliedDate: '' },
                
                init() {
                    db.ref('leaves').on('value', (snapshot) => {
                        const data = snapshot.val();
                        this.leaves = data ? Object.values(data).reverse() : [];
                    });
                },

                get filteredLeaves() { return this.leaves.filter(l => l.name.toLowerCase().includes(this.search.toLowerCase())); },
                get uniqueNames() { return [...new Set(this.leaves.map(l => l.name))]; },

                calculateDaysForEntry() {
                    if (this.form.isHalfDay) return 0.5;
                    const s = new Date(this.form.startDate);
                    const e = new Date(this.form.endDate);
                    const diff = Math.floor((e - s) / (1000 * 60 * 60 * 24)) + 1;
                    return diff > 0 ? diff : 0;
                },

                totalLeaveDays() {
                    return this.leaves.reduce((sum, l) => sum + (parseFloat(l.totalDays) || 0), 0);
                },

                countActiveToday() {
                    const now = new Date(this.today);
                    return this.leaves.filter(l => {
                        const s = new Date(l.startDate);
                        const e = new Date(l.isHalfDay ? l.startDate : l.endDate);
                        return now >= s && now <= e;
                    }).length;
                },

                saveLeave() {
                    if (!this.form.name || !this.form.startDate) return alert('Name and Start Date required');
                    if (!this.form.isHalfDay && !this.form.endDate) return alert('End Date required for full leaves');
                    
                    const id = this.form.id || Date.now();
                    const entryData = { 
                        ...this.form, 
                        id: id, 
                        appliedDate: this.form.appliedDate || this.today,
                        totalDays: this.calculateDaysForEntry()
                    };
                    
                    db.ref('leaves/' + id).set(entryData);
                    this.closeModal();
                },

                openModal() { this.isEditing = false; this.resetForm(); this.showForm = true; },
                closeModal() { this.showForm = false; this.resetForm(); },
                editLeave(item) { this.form = { ...item }; this.isEditing = true; this.showForm = true; },
                deleteLeave(id) { if (confirm('Delete?')) db.ref('leaves/' + id).remove(); },
                resetForm() { this.form = { id: null, name: '', type: 'Sick', startDate: this.today, endDate: this.today, isHalfDay: false, appliedDate: '' }; }
            }
        }
    </script>
</body>
</html>
