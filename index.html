<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovate TechSupport | Leave Management Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 font-sans antialiased">

    <div class="max-w-6xl mx-auto py-10 px-4" x-data="leaveSystem()" x-init="init()">
        
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border-t-4 border-blue-600 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-slate-800">Innovate TechSupport</h1>
                <p class="text-blue-600 font-bold uppercase text-xs tracking-widest">Operations Leave Management System</p>
            </div>
            <div class="text-right mt-4 md:mt-0">
                <button @click="showForm = !showForm" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold transition-all shadow-lg">
                    <span x-text="showForm ? '− Close Form' : '+ Add New Record'"></span>
                </button>
            </div>
        </div>

        <div x-show="showForm" x-transition class="bg-white p-6 rounded-xl shadow-md border border-blue-100 mb-8">
            <h2 class="text-lg font-bold mb-4 text-slate-700" x-text="isEditing ? 'Edit Record' : 'Add New Leave Record'"></h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" x-model="form.name" placeholder="Employee Name" class="border p-2 rounded">
                <select x-model="form.type" class="border p-2 rounded text-gray-600">
                    <option value="Casual Leave">Casual Leave</option>
                    <option value="Annual Leave">Annual Leave</option>
                    <option value="Sick Leave">Sick Leave</option>
                </select>
                <input type="text" x-model="form.from" placeholder="From Date (e.g. 2082-01-01)" class="border p-2 rounded">
                <input type="text" x-model="form.to" placeholder="To Date" class="border p-2 rounded">
                <input type="number" step="0.5" x-model="form.days" placeholder="Total Days" class="border p-2 rounded">
                <div class="flex gap-2">
                    <button @click="saveRecord()" class="bg-emerald-500 text-white px-4 py-2 rounded font-bold w-full hover:bg-emerald-600">Save</button>
                    <button @click="resetForm()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold w-full hover:bg-gray-300">Cancel</button>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <div class="relative max-w-md">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    🔍
                </span>
                <input type="text" x-model="search" placeholder="Filter by Employee Name..." 
                       class="pl-10 w-full p-3 border border-gray-200 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-xl overflow-hidden border border-gray-200">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Name</th>
                        <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Type</th>
                        <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Duration</th>
                        <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-center">Days</th>
                        <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <template x-for="(item, index) in filteredLeaves" :key="index">
                        <tr class="hover:bg-blue-50/50 transition-colors">
                            <td class="px-6 py-4 font-bold text-slate-700" x-text="item.name"></td>
                            <td class="px-6 py-4">
                                <span :class="{
                                    'bg-orange-100 text-orange-700': item.type === 'Casual Leave',
                                    'bg-green-100 text-green-700': item.type === 'Annual Leave',
                                    'bg-red-100 text-red-700': item.type === 'Sick Leave'
                                }" class="px-3 py-1 rounded-full text-[10px] font-black uppercase" x-text="item.type"></span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-500">
                                <span x-text="item.from"></span> → <span x-text="item.to"></span>
                            </td>
                            <td class="px-6 py-4 text-center font-bold text-blue-600" x-text="item.days"></td>
                            <td class="px-6 py-4 text-right space-x-2">
                                <button @click="editRecord(item)" class="text-blue-500 hover:text-blue-700 font-bold text-sm">Edit</button>
                                <button @click="deleteRecord(item.id)" class="text-red-500 hover:text-red-700 font-bold text-sm">Delete</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function leaveSystem() {
            return {
                search: '',
                showForm: false,
                isEditing: false,
                leaves: [],
                form: { id: null, name: '', type: 'Casual Leave', from: '', to: '', days: '' },
                
                init() {
                    const saved = localStorage.getItem('it-leaves');
                    if (saved) {
                        this.leaves = JSON.parse(saved);
                    } else {
                        // Default data if empty
                        this.leaves = [
                            { id: Date.now(), name: "Sunita Didi", type: "Casual Leave", from: "1/7/2082", to: "1/8/2082", days: 2 }
                        ];
                    }
                },

                get filteredLeaves() {
                    return this.leaves.filter(i => i.name.toLowerCase().includes(this.search.toLowerCase()));
                },

                saveRecord() {
                    if (!this.form.name || !this.form.days) return alert('Please fill Name and Days');
                    
                    if (this.isEditing) {
                        this.leaves = this.leaves.map(l => l.id === this.form.id ? { ...this.form } : l);
                    } else {
                        this.leaves.push({ ...this.form, id: Date.now() });
                    }
                    
                    this.persist();
                    this.resetForm();
                },

                editRecord(item) {
                    this.form = { ...item };
                    this.isEditing = true;
                    this.showForm = true;
                },

                deleteRecord(id) {
                    if (confirm('Delete this record?')) {
                        this.leaves = this.leaves.filter(l => l.id !== id);
                        this.persist();
                    }
                },

                persist() {
                    localStorage.setItem('it-leaves', JSON.stringify(this.leaves));
                },

                resetForm() {
                    this.form = { id: null, name: '', type: 'Casual Leave', from: '', to: '', days: '' };
                    this.isEditing = false;
                    this.showForm = false;
                }
            }
        }
    </script>
</body>
</html>
