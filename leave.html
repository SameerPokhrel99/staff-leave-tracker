<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Leave Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfbf7; }
        .cream-card { background-color: #ffffff; border: 1px solid #e9e4d9; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="leaveSystem()" x-init="init()">
    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 bg-[#fdfbf7] z-[1000] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-200 w-full max-w-md">
            <h1 class="text-3xl font-black text-slate-900 uppercase text-center mb-8 tracking-tighter">Staff Leave Portal</h1>
            <div class="space-y-4">
                <input type="email" x-model="loginEmail" placeholder="Email" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold">
                <input type="password" x-model="loginPassword" placeholder="Password" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold">
                <button @click="login()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-bold">LOG IN</button>
                <p x-show="authError" x-text="authError" class="text-rose-500 text-xs font-bold text-center"></p>
            </div>
        </div>
    </div>

    <div x-show="isLoggedIn">
        <nav class="bg-white border-b px-6 py-3 flex justify-between items-center sticky top-0 z-[200]">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center font-black" x-text="userInitial"></div>
                <p class="text-[10px] font-bold text-slate-700" x-text="currentUserEmail"></p>
            </div>
            <button @click="logout()" class="text-[10px] font-black text-rose-500 uppercase">Sign Out</button>
        </nav>

        <main class="max-w-7xl mx-auto px-6 py-10">
            <div class="flex flex-col md:flex-row justify-between items-end mb-10 pb-6 border-b border-slate-200">
                <h1 class="text-4xl font-black text-slate-900 uppercase">Leave Ledger</h1>
                <button @click="openModal()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl">＋ NEW ENTRY</button>
            </div>

            <div class="cream-card rounded-[2.5rem] overflow-hidden mb-12">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <th class="px-8 py-6">Staff & Activity</th>
                            <th class="px-8 py-6 text-center">Duration</th>
                            <th class="px-8 py-6 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <template x-for="item in leaves" :key="item.id">
                            <tr>
                                <td class="px-8 py-6">
                                    <p class="font-black text-slate-800 text-lg uppercase" x-text="item.name"></p>
                                    <div class="text-[9px] text-slate-400 font-bold" x-show="item.lastEditedBy" 
                                         x-text="'Last Edited: ' + item.lastEditedBy.split('@')[0] + ' • ' + item.lastEditedAt"></div>
                                </td>
                                <td class="px-8 py-6 text-center">
                                    <p class="text-sm font-black" x-text="item.startDate + (item.isHalfDay ? ' (Half)' : ' to ' + item.endDate)"></p>
                                    <p class="text-xs text-indigo-500 font-bold" x-text="item.totalDays + ' Days'"></p>
                                </td>
                                <td class="px-8 py-6 text-right space-x-4">
                                    <button @click="editLeave(item)" class="text-indigo-600 font-black text-[10px] uppercase">Edit</button>
                                    <template x-if="currentUserEmail === superAdmin">
                                        <button @click="deleteLeave(item.id)" class="text-rose-400 font-black text-[10px] uppercase">Delete</button>
                                    </template>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <template x-if="currentUserEmail === superAdmin">
                <div class="border-t pt-10">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-[.3em] mb-6">Management Audit</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="cream-card p-6 rounded-3xl">
                            <template x-for="(count, user) in getUserStats()">
                                <div class="flex justify-between py-2 border-b last:border-0 uppercase text-xs font-bold">
                                    <span x-text="user"></span>
                                    <span class="text-indigo-600" x-text="count + ' Updates'"></span>
                                </div>
                            </template>
                        </div>
                        <button @click="exportCSV()" class="bg-emerald-600 text-white rounded-3xl font-black uppercase text-sm h-fit p-6 shadow-lg">Export Full Report (.CSV)</button>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <div x-show="showForm" x-cloak class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[300] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-2xl font-black mb-8 uppercase">Leave Entry</h3>
            <div class="space-y-6">
                <div><label class="text-[10px] font-black text-slate-400 uppercase">Name</label><input type="text" x-model="form.name" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold"></div>
                <div class="flex items-center gap-2"><input type="checkbox" x-model="form.isHalfDay" id="hd"><label for="hd" class="font-bold text-sm">Half Day</label></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase">Start</label><input type="date" x-model="form.startDate" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold"></div>
                    <div x-show="!form.isHalfDay"><label class="text-[10px] font-black text-slate-400 uppercase">End</label><input type="date" x-model="form.endDate" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold"></div>
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button @click="saveLeave()" class="flex-1 bg-indigo-600 text-white p-5 rounded-2xl font-bold">SAVE</button>
                <button @click="showForm = false" class="px-6 text-slate-400 font-bold uppercase text-xs">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAOTE2f_iGVlR3u-hZ5n5OPaRXnuYmA9gQ", authDomain: "insurancetracker-69b69.firebaseapp.com", databaseURL: "https://insurancetracker-69b69-default-rtdb.firebaseio.com", projectId: "insurancetracker-69b69", storageBucket: "insurancetracker-69b69.firebasestorage.app", messagingSenderId: "419918361385", appId: "1:419918361385:web:01ec2d6b32b0df6988fd38" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        function leaveSystem() {
            return {
                isLoggedIn: false, currentUserEmail: '', userInitial: '', superAdmin: 'sameer.pokharel@innovatetech.co',
                loginEmail: '', loginPassword: '', authError: '', showForm: false, leaves: [],
                form: { id: null, name: '', startDate: '', endDate: '', isHalfDay: false },
                init() { firebase.auth().onAuthStateChanged(user => { if(user){ this.isLoggedIn = true; this.currentUserEmail = user.email; this.userInitial = user.email[0].toUpperCase(); this.loadData(); } }); },
                login() { firebase.auth().signInWithEmailAndPassword(this.loginEmail, this.loginPassword).catch(() => this.authError = "Error"); },
                logout() { firebase.auth().signOut().then(() => window.location.reload()); },
                loadData() { db.ref('leaves').on('value', snap => { const d = snap.val(); this.leaves = d ? Object.values(d).reverse() : []; }); },
                saveLeave() {
                    const id = this.form.id || Date.now();
                    let total = 0.5;
                    if(!this.form.isHalfDay) { const s = new Date(this.form.startDate); const e = new Date(this.form.endDate); total = Math.floor((e-s)/86400000)+1; }
                    db.ref('leaves/'+id).set({...this.form, id: id, totalDays: total, lastEditedBy: this.currentUserEmail, lastEditedAt: new Date().toLocaleString()});
                    this.showForm = false;
                },
                deleteLeave(id) { if(confirm('Delete?')) db.ref('leaves/'+id).remove(); },
                getUserStats() { const s = {}; this.leaves.forEach(l => { if(l.lastEditedBy) { const n = l.lastEditedBy.split('@')[0]; s[n] = (s[n]||0)+1; } }); return s; },
                exportCSV() {
                    let c = "Name,Start,End,Days,By\n";
                    this.leaves.forEach(l => { c += `${l.name},${l.startDate},${l.endDate},${l.totalDays},${l.lastEditedBy}\n`; });
                    const b = new Blob([c], {type: 'text/csv'}); const u = window.URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = 'Leaves.csv'; a.click();
                },
                openModal() { this.form = { id: null, name: '', startDate: '', endDate: '', isHalfDay: false }; this.showForm = true; },
                editLeave(item) { this.form = {...item}; this.showForm = true; }
            }
        }
    </script>
</body>
</html>
