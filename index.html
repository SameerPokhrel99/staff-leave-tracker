<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Leave Ledger | Innovate Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfbf7; }
        .cream-card { background-color: #ffffff; border: 1px solid #e9e4d9; }
        .status-approved { color: #059669; background-color: #ecfdf5; border: 1px solid #d1fae5; }
        .status-pending { color: #d97706; background-color: #fffbeb; border: 1px solid #fef3c7; }
        .status-rejected { color: #dc2626; background-color: #fef2f2; border: 1px solid #fee2e2; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="leaveSystem()" x-init="init()">

    <div class="bg-indigo-900 text-white text-[10px] font-black uppercase tracking-[0.3em] py-2 text-center">
        Cloud Sync Active • Leave Management Portal
    </div>

    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 pb-6 border-b border-slate-200">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Leave Attendance Ledger</h1>
                <p class="text-slate-500 font-medium">Real-time tracking of employee absence & approvals</p>
            </div>
            <button @click="openModal()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black hover:bg-indigo-700 transition-all shadow-xl">
                ＋ ADD LEAVE ENTRY
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="p-6 rounded-3xl border border-slate-200 bg-white">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Leaves Today</p>
                <p class="text-4xl font-black text-indigo-600" x-text="countActiveToday()"></p>
            </div>
            <div class="p-6 rounded-3xl border border-amber-100 bg-amber-50">
                <p class="text-[10px] font-black text-amber-600 uppercase tracking-widest">Pending Approvals</p>
                <p class="text-4xl font-black text-amber-700" x-text="leaves.filter(l => l.status === 'Pending').length"></p>
            </div>
            <div class="p-6 rounded-3xl border border-slate-200 bg-white">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Monthly Leaves</p>
                <p class="text-4xl font-black text-slate-800" x-text="leaves.length"></p>
            </div>
        </div>

        <div class="cream-card rounded-[2rem] overflow-hidden shadow-sm">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Employee</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Type & Duration</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Status</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 bg-white">
                    <template x-for="item in leaves" :key="item.id">
                        <tr class="hover:bg-slate-50/50">
                            <td class="px-8 py-6">
                                <p class="font-black text-slate-800 text-lg uppercase" x-text="item.name"></p>
                                <p class="text-xs text-slate-400 font-bold" x-text="'Applied: ' + item.appliedDate"></p>
                            </td>
                            <td class="px-8 py-6">
                                <div class="inline-block px-3 py-1 bg-slate-100 rounded-lg text-[10px] font-black text-slate-500 uppercase mb-1" x-text="item.type"></div>
                                <p class="text-sm font-bold text-slate-700" x-text="item.startDate + ' to ' + item.endDate"></p>
                                <p class="text-[10px] font-bold text-indigo-500" x-text="calculateDays(item.startDate, item.endDate) + ' Total Days'"></p>
                            </td>
                            <td class="px-8 py-6">
                                <span class="px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-sm" 
                                      :class="'status-' + item.status.toLowerCase()" x-text="item.status"></span>
                            </td>
                            <td class="px-8 py-6 text-right space-x-3">
                                <button @click="editLeave(item)" class="text-indigo-600 font-black text-[10px] uppercase">Edit</button>
                                <button @click="deleteLeave(item.id)" class="text-slate-300 hover:text-rose-500 font-black text-[10px] uppercase">Del</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div x-show="showForm" x-cloak class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-xl rounded-[2.5rem] p-10 shadow-2xl" @click.away="closeModal()">
                <h3 class="text-2xl font-black mb-8" x-text="isEditing ? 'Modify Leave Record' : 'New Leave Application'"></h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Employee Name</label>
                        <input type="text" x-model="form.name" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Leave Type</label>
                        <select x-model="form.type" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none font-bold">
                            <option value="Sick">Sick Leave</option>
                            <option value="Casual">Casual Leave</option>
                            <option value="Annual">Annual Leave</option>
                            <option value="Unpaid">Unpaid Leave</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Approval Status</label>
                        <select x-model="form.status" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none font-bold">
                            <option value="Pending">Pending</option>
                            <option value="Approved">Approved</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Start Date</label>
                        <input type="date" x-model="form.startDate" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">End Date</label>
                        <input type="date" x-model="form.endDate" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none">
                    </div>
                </div>
                <div class="flex gap-4 mt-10">
                    <button @click="saveLeave()" class="flex-1 bg-indigo-600 text-white p-5 rounded-2xl font-bold">Sync Record</button>
                    <button @click="closeModal()" class="px-8 text-slate-400 font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // PASTE YOUR SAME FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyAOTE2f_iGVlR3u-hZ5n5OPaRXnuYmA9gQ",
  authDomain: "insurancetracker-69b69.firebaseapp.com",
  databaseURL: "https://insurancetracker-69b69-default-rtdb.firebaseio.com",
  projectId: "insurancetracker-69b69",
  storageBucket: "insurancetracker-69b69.firebasestorage.app",
  messagingSenderId: "419918361385",
  appId: "1:419918361385:web:01ec2d6b32b0df6988fd38",
  measurementId: "G-QYD54HWGRB"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function leaveSystem() {
            return {
                showForm: false,
                isEditing: false,
                leaves: [],
                today: new Date().toISOString().split('T')[0],
                form: { id: null, name: '', type: 'Sick', startDate: '', endDate: '', status: 'Pending', appliedDate: '' },
                
                init() {
                    db.ref('leaves').on('value', (snapshot) => {
                        const data = snapshot.val();
                        this.leaves = data ? Object.values(data).reverse() : [];
                    });
                },

                calculateDays(start, end) {
                    if (!start || !end) return 0;
                    const s = new Date(start);
                    const e = new Date(end);
                    const diff = Math.floor((e - s) / (1000 * 60 * 60 * 24)) + 1;
                    return diff > 0 ? diff : 0;
                },

                countActiveToday() {
                    const now = new Date();
                    return this.leaves.filter(l => {
                        const s = new Date(l.startDate);
                        const e = new Date(l.endDate);
                        return l.status === 'Approved' && now >= s && now <= e;
                    }).length;
                },

                saveLeave() {
                    if (!this.form.name || !this.form.startDate || !this.form.endDate) return alert('Please fill all dates');
                    const id = this.form.id || Date.now();
                    if (!this.form.appliedDate) this.form.appliedDate = this.today;
                    db.ref('leaves/' + id).set({ ...this.form, id: id });
                    this.closeModal();
                },

                openModal() { this.isEditing = false; this.resetForm(); this.showForm = true; },
                closeModal() { this.showForm = false; this.resetForm(); },
                editLeave(item) { this.form = { ...item }; this.isEditing = true; this.showForm = true; },
                deleteLeave(id) { if (confirm('Delete leave record?')) db.ref('leaves/' + id).remove(); },
                resetForm() { this.form = { id: null, name: '', type: 'Sick', startDate: this.today, endDate: this.today, status: 'Pending', appliedDate: '' }; }
            }
        }
    </script>
</body>
</html>
