<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Leave Ledger | Secured</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfbf7; }
        .cream-card { background-color: #ffffff; border: 1px solid #e9e4d9; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="leaveSystem()" x-init="init()">

    <div x-show="!isLoggedIn" class="fixed inset-0 bg-[#fdfbf7] z-[1000] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-200 w-full max-w-md text-center">
            <h1 class="text-3xl font-black text-slate-900 uppercase">Innovate Tech</h1>
            <p class="text-slate-400 font-bold text-[10px] mt-2 mb-8 uppercase tracking-widest">Leave Portal Login</p>
            <div class="space-y-5">
                <input type="email" x-model="loginEmail" placeholder="Email" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold">
                <input type="password" x-model="loginPassword" placeholder="Password" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold">
                <button @click="login()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-bold">LOG IN</button>
            </div>
        </div>
    </div>

    <div x-show="isLoggedIn" class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center sticky top-0 z-[200]">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-indigo-600 text-white rounded-full flex items-center justify-center text-xs font-black" x-text="userInitial"></div>
            <p class="text-[10px] font-bold text-slate-700" x-text="currentUserEmail"></p>
        </div>
        <button @click="logout()" class="text-[10px] font-black text-rose-500 uppercase">Sign Out</button>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-10" x-show="isLoggedIn">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 pb-6 border-b border-slate-200">
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Leave Attendance Ledger</h1>
            <button @click="openModal()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl">＋ NEW ENTRY</button>
        </div>

        <div class="cream-card rounded-[2rem] overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400">Employee & Activity</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 text-center">Duration</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 text-right">Settings</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 bg-white">
                    <template x-for="item in leaves" :key="item.id">
                        <tr class="hover:bg-slate-50/50">
                            <td class="px-8 py-6">
                                <p class="font-black text-slate-800 text-lg uppercase" x-text="item.name"></p>
                                <div x-show="item.lastEditedBy" class="mt-1">
                                    <span class="text-[8px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold uppercase" x-text="'Edited By: ' + item.lastEditedBy.split('@')[0] + ' • ' + item.lastEditedAt"></span>
                                </div>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <p class="text-sm font-black text-slate-700" x-text="item.startDate + (item.isHalfDay ? ' (Half)' : ' to ' + item.endDate)"></p>
                                <p class="text-xs font-bold text-indigo-500" x-text="item.totalDays + ' Days'"></p>
                            </td>
                            <td class="px-8 py-6 text-right space-x-3">
                                <button @click="editLeave(item)" class="text-indigo-600 font-black text-[10px] uppercase">Edit</button>
                                <template x-if="currentUserEmail === superAdmin">
                                    <button @click="deleteLeave(item.id)" class="text-rose-500 font-black text-[10px] uppercase">Delete</button>
                                </template>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </main>

    <div x-show="showForm" x-cloak class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] p-10" @click.away="closeModal()">
            <h3 class="text-2xl font-black mb-8">Leave Entry</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 font-bold">
                <div class="md:col-span-2"><label class="text-[10px] font-black text-slate-400 uppercase">Employee</label><input type="text" x-model="form.name" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none"></div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase">Start Date</label><input type="date" x-model="form.startDate" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none"></div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase">End Date</label><input type="date" x-model="form.endDate" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none"></div>
            </div>
            <div class="flex gap-4 mt-10">
                <button @click="saveLeave()" class="flex-1 bg-indigo-600 text-white p-5 rounded-2xl font-bold">Record Leave</button>
                <button @click="closeModal()" class="px-8 text-slate-400 font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOTE2f_iGVlR3u-hZ5n5OPaRXnuYmA9gQ",
            authDomain: "insurancetracker-69b69.firebaseapp.com",
            databaseURL: "https://insurancetracker-69b69-default-rtdb.firebaseio.com",
            projectId: "insurancetracker-69b69",
            storageBucket: "insurancetracker-69b69.firebasestorage.app",
            messagingSenderId: "419918361385",
            appId: "1:419918361385:web:01ec2d6b32b0df6988fd38"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function leaveSystem() {
            return {
                isLoggedIn: false, currentUserEmail: '', userInitial: '', superAdmin: 'sameer.pokharel@innovatetech.co',
                loginEmail: '', loginPassword: '', showForm: false, leaves: [],
                form: { id: null, name: '', startDate: '', endDate: '', isHalfDay: false },
                init() {
                    firebase.auth().onAuthStateChanged(user => {
                        if (user) { this.isLoggedIn = true; this.currentUserEmail = user.email; this.userInitial = user.email[0].toUpperCase(); this.loadData(); }
                    });
                },
                login() { firebase.auth().signInWithEmailAndPassword(this.loginEmail, this.loginPassword); },
                logout() { firebase.auth().signOut(); },
                loadData() { db.ref('leaves').on('value', snap => { const d = snap.val(); this.leaves = d ? Object.values(d).reverse() : []; }); },
                saveLeave() {
                    const id = this.form.id || Date.now();
                    const s = new Date(this.form.startDate); const e = new Date(this.form.endDate);
                    const diff = Math.floor((e - s) / 86400000) + 1;
                    const data = { ...this.form, id: id, totalDays: diff, lastEditedBy: this.currentUserEmail, lastEditedAt: new Date().toLocaleString() };
                    db.ref('leaves/' + id).set(data); this.closeModal();
                },
                deleteLeave(id) { if(confirm('Delete?')) db.ref('leaves/' + id).remove(); },
                openModal() { this.form = { id: null, name: '', startDate: '', endDate: '' }; this.showForm = true; },
                closeModal() { this.showForm = false; },
                editLeave(item) { this.form = { ...item }; this.showForm = true; }
            }
        }
    </script>
</body>
</html>
