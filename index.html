<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Leave Ledger | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfbf7; }
        .cream-card { background-color: #ffffff; border: 1px solid #e9e4d9; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="leaveSystem()" x-init="init()">

    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 bg-[#fdfbf7] z-[1000] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-200 w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tighter">Innovate Tech</h1>
                <p class="text-slate-400 font-bold text-[10px] mt-2 uppercase tracking-widest">Staff Leave Portal</p>
            </div>
            <div class="space-y-5">
                <input type="email" x-model="loginEmail" placeholder="Corporate Email" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold">
                <input type="password" x-model="loginPassword" placeholder="Password" class="w-full bg-slate-50 border p-4 rounded-2xl outline-none font-bold">
                <button @click="login()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-bold hover:bg-indigo-700 transition-all">SECURE LOGIN</button>
                <p x-show="authError" x-text="authError" class="text-rose-500 text-xs font-bold text-center mt-2"></p>
            </div>
        </div>
    </div>

    <div x-show="isLoggedIn" class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center sticky top-0 z-[200]">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-indigo-600 text-white rounded-2xl flex items-center justify-center text-sm font-black shadow-lg" x-text="userInitial"></div>
            <div>
                <p class="text-[8px] font-black text-slate-400 uppercase leading-none">Management Session</p>
                <p class="text-[10px] font-bold text-slate-700" x-text="currentUserEmail"></p>
            </div>
        </div>
        <button @click="logout()" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-rose-100 transition-all">Sign Out</button>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-10" x-show="isLoggedIn">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 pb-6 border-b border-slate-200">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">Leave Ledger</h1>
                <p class="text-slate-500 font-medium tracking-tight">Real-time tracking • Support for Half Days</p>
            </div>
            <button @click="openModal()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black hover:bg-indigo-700 transition-all shadow-xl">＋ NEW LEAVE ENTRY</button>
        </div>

        <div class="cream-card rounded-[2.5rem] overflow-hidden shadow-sm mb-12">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest">Employee & Activity</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-center">Duration</th>
                        <th class="px-8 py-6 text-[10px] font-black uppercase text-slate-400 tracking-widest text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 bg-white">
                    <template x-for="item in leaves" :key="item.id">
                        <tr class="hover:bg-slate-50/50 transition-colors">
                            <td class="px-8 py-6">
                                <p class="font-black text-slate-800 text-lg uppercase" x-text="item.name"></p>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[9px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-md font-bold uppercase" 
                                          x-text="item.lastEditedBy ? 'Modified by: ' + item.lastEditedBy.split('@')[0] : 'Original Entry'"></span>
                                    <span class="text-[9px] text-slate-300 font-bold" x-text="item.lastEditedAt || ''"></span>
                                </div>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <p class="text-sm font-black text-slate-700 uppercase" x-text="item.startDate + (item.isHalfDay ? ' (Half)' : ' to ' + item.endDate)"></p>
                                <p class="text-xs font-bold text-indigo-500" x-text="item.totalDays + ' Days'"></p>
                            </td>
                            <td class="px-8 py-6 text-right">
                                <div class="flex justify-end gap-4">
                                    <button @click="editLeave(item)" class="text-indigo-600 font-black text-[10px] uppercase hover:underline">Edit</button>
                                    <template x-if="currentUserEmail === superAdmin">
                                        <button @click="deleteLeave(item.id)" class="text-rose-400 hover:text-rose-600 font-black text-[10px] uppercase">Delete</button>
                                    </template>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <template x-if="currentUserEmail === superAdmin">
            <div class="mt-20 border-t border-slate-200 pt-12">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xl font-black text-slate-900 uppercase tracking-tight">Management Audit Dashboard</h2>
                    <button @click="exportToExcel()" class="bg-emerald-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">Export Ledger (.CSV)</button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="cream-card p-6 rounded-3xl">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Activity Leaderboard</p>
                        <div class="space-y-3">
                            <template x-for="(count, user) in getUserStats()" :key="user">
                                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                                    <span class="text-xs font-black text-slate-600 uppercase" x-text="user"></span>
                                    <span class="text-xs font-black text-indigo-600" x-text="count + ' Updates'"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <div x-show="showForm" x-cloak class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] p-10 shadow-2xl" @click.away="closeModal()">
            <h3 class="text-2xl font-black mb-8 uppercase tracking-tighter">Leave Entry</h3>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">Staff Name</label>
                    <input type="text" x-model="form.name" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none font-bold">
                </div>
                <div class="flex items-center gap-3 bg-indigo-50 p-4 rounded-2xl">
                    <input type="checkbox" id="halfDay" x-model="form.isHalfDay" class="w-5 h-5 accent-indigo-600">
                    <label for="halfDay" class="font-black text-indigo-900 text-sm uppercase">Is this a Half Day?</label>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Start Date</label>
                        <input type="date" x-model="form.startDate" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none font-bold">
                    </div>
                    <div x-show="!form.isHalfDay">
                        <label class="text-[10px] font-black text-slate-400 uppercase">End Date</label>
                        <input type="date" x-model="form.endDate" class="w-full bg-slate-50 border p-4 rounded-2xl mt-1 outline-none font-bold">
                    </div>
                </div>
            </div>
            <div class="flex gap-4 mt-10">
                <button @click="saveLeave()" class="flex-1 bg-indigo-600 text-white p-5 rounded-2xl font-bold shadow-lg">Confirm Entry</button>
                <button @click="closeModal()" class="px-8 text-slate-400 font-bold uppercase text-xs">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOTE2f_iGVlR3u-hZ5n5OPaRXnuYmA9gQ",
            authDomain: "insurancetracker-69b69.firebaseapp.com",
            databaseURL: "https://insurancetracker-69b69-default-rtdb.firebaseio.com",
            projectId: "insurancetracker-69b69",
            storageBucket: "insurancetracker-69b69.firebasestorage.app",
            messagingSenderId: "419918361385",
            appId: "1:419918361385:web:01ec2d6b32b0df6988fd38"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function leaveSystem() {
            return {
                isLoggedIn: false, currentUserEmail: '', userInitial: '', superAdmin: 'sameer.pokharel@innovatetech.co',
                loginEmail: '', loginPassword: '', authError: '', showForm: false, leaves: [],
                form: { id: null, name: '', startDate: '', endDate: '', isHalfDay: false },

                init() {
                    firebase.auth().onAuthStateChanged(user => {
                        if (user) { this.isLoggedIn = true; this.currentUserEmail = user.email; this.userInitial = user.email[0].toUpperCase(); this.loadData(); }
                        else { this.isLoggedIn = false; }
                    });
                },
                login() { firebase.auth().signInWithEmailAndPassword(this.loginEmail, this.loginPassword).catch(() => this.authError = "Invalid Login"); },
                logout() { firebase.auth().signOut().then(() => window.location.reload()); },
                loadData() { db.ref('leaves').on('value', snap => { const d = snap.val(); this.leaves = d ? Object.values(d).reverse() : []; }); },
                
                saveLeave() {
                    const id = this.form.id || Date.now();
                    let total = 0.5;
                    if(!this.form.isHalfDay) {
                        const s = new Date(this.form.startDate);
                        const e = new Date(this.form.endDate);
                        total = Math.max(0, Math.floor((e - s) / 86400000) + 1);
                    }
                    const data = { 
                        ...this.form, 
                        id: id, 
                        totalDays: total, 
                        lastEditedBy: this.currentUserEmail, 
                        lastEditedAt: new Date().toLocaleString() 
                    };
                    db.ref('leaves/' + id).set(data);
                    this.closeModal();
                },

                deleteLeave(id) { if(confirm('Delete permanently?')) db.ref('leaves/' + id).remove(); },
                getUserStats() {
                    const stats = {};
                    this.leaves.forEach(l => { if(l.lastEditedBy) { const n = l.lastEditedBy.split('@')[0]; stats[n] = (stats[n] || 0) + 1; } });
                    return stats;
                },
                exportToExcel() {
                    let csv = "Employee,Start Date,End Date,Half Day,Total Days,Last Modified By,Modified At\n";
                    this.leaves.forEach(l => {
                        csv += `${l.name},${l.startDate},${l.isHalfDay ? 'N/A' : l.endDate},${l.isHalfDay ? 'Yes' : 'No'},${l.totalDays},${l.lastEditedBy},${l.lastEditedAt}\n`;
                    });
                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.setAttribute('href', url);
                    a.setAttribute('download', `Leave_Ledger_${new Date().toLocaleDateString()}.csv`);
                    a.click();
                },
                openModal() { this.form = { id: null, name: '', startDate: '', endDate: '', isHalfDay: false }; this.showForm = true; },
                closeModal() { this.showForm = false; },
                editLeave(item) { this.form = { ...item }; this.showForm = true; }
            }
        }
    </script>
</body>
</html>
